name: Sync Portfolio Data

on:
  # Run daily at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync-github-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PORTFOLIO_TOKEN }}
        run: npm run sync-github

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code data/github.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/github.json
          git commit -m "chore: auto-sync GitHub data [skip ci]"
          git push
